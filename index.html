<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="レシピ管理">
<meta name="color-scheme" content="light only">
<meta name="supported-color-schemes" content="light">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<title>レシピ管理 | Café照</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;600;700;800&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
/* ダークモード対策（強制ライトモード） */
@media (prefers-color-scheme: dark) {
  html, body { background: #eae5dc !important; color: #1c1612 !important; color-scheme: light !important; }
}
:root{--ink:#1c1612;--bg:#eae5dc;--cream:#f8f4ed;--card:#fff;--gd:#2a5c3f;--gm:#4a8c62;--gl:#c8e6d0;--gxl:#f0f9f3;--gold:#b8902a;--gold-l:#fdf0d0;--red:#c0392b;--border:#ddd5c2;--line:#e8e0d0;--mid:#7a6e5e;--light:#f5f0e8;--shadow:rgba(28,22,18,.10)}
body{background:var(--bg);font-family:"Zen Kaku Gothic New",sans-serif;color:var(--ink);min-height:100vh}
.page{max-width:520px;margin:0 auto;padding:0 0 calc(80px + env(safe-area-inset-bottom,10px))}
.top-bar{background:var(--gd);padding:14px 16px 11px;display:flex;align-items:flex-end;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 3px 20px rgba(42,92,63,.4)}
.top-shop{font-size:9px;color:rgba(255,255,255,.6);letter-spacing:.2em;font-family:"Shippori Mincho B1",serif;display:block;margin-bottom:1px}
.top-title{font-family:"Shippori Mincho B1",serif;font-size:18px;font-weight:800;color:#fff;letter-spacing:.05em;line-height:1}
.cloud-btn{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:20px;padding:6px 12px;font-size:10px;cursor:pointer;letter-spacing:.1em;font-family:"Shippori Mincho B1",serif;touch-action:manipulation}
.tab-bar{background:var(--cream);border-bottom:2px solid var(--border);display:grid;grid-template-columns:repeat(3,1fr);position:sticky;top:53px;z-index:190}
.tab-btn{padding:10px 2px 8px;border:none;background:transparent;font-family:"Zen Kaku Gothic New",sans-serif;font-size:10px;font-weight:500;color:var(--mid);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;border-bottom:2px solid transparent;margin-bottom:-2px;touch-action:manipulation;-webkit-tap-highlight-color:rgba(42,92,63,.1);width:100%}
.tab-btn .ico{font-size:16px}
.tab-btn.on{color:var(--gd);border-bottom-color:var(--gd);font-weight:700}
.toolbar{background:var(--cream);border-bottom:1px solid var(--border);padding:9px 12px;position:sticky;top:97px;z-index:180}
.search-row{display:flex;gap:8px;margin-bottom:7px}
.search-inp{flex:1;height:40px;border:1.5px solid var(--border);border-radius:10px;padding:0 12px;font-size:14px;font-family:"Zen Kaku Gothic New",sans-serif;color:var(--ink);background:#fff;outline:none;-webkit-appearance:none}
.search-inp:focus{border-color:var(--gm)}
.btn-add{height:40px;padding:0 14px;background:var(--gd);color:#fff;border:none;border-radius:10px;font-family:"Shippori Mincho B1",serif;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.cat-scroll{display:flex;gap:5px;overflow-x:auto;padding-bottom:3px;cursor:grab}
.cat-scroll:active{cursor:grabbing}
.cat-scroll::-webkit-scrollbar{height:3px}
.cat-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.cat-btn{flex-shrink:0;padding:5px 12px;border:1.5px solid var(--border);border-radius:20px;background:#fff;font-size:11px;color:var(--mid);cursor:pointer;font-family:"Zen Kaku Gothic New",sans-serif;white-space:nowrap;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.cat-btn.on{background:var(--gd);border-color:var(--gd);color:#fff;font-weight:700}
.count-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 14px 3px;font-size:11px;color:var(--mid)}
.count-bar strong{font-family:"Shippori Mincho B1",serif;font-size:14px;color:var(--gd)}
.card{background:var(--card);border-radius:13px;box-shadow:0 2px 10px var(--shadow);margin:0 12px 8px;overflow:hidden}
.badge{font-size:9px;padding:2px 8px;border-radius:20px;font-weight:700;white-space:nowrap}
.bc-meat{background:#fff0e8;color:#8b3a15}.bc-dairy{background:#f0ecfa;color:#5a3a8b}.bc-season{background:#e8f5e9;color:#2a5c3f}.bc-oil{background:#fffde7;color:#7a6a00}.bc-pasta{background:#fce4ec;color:#880e4f}.bc-veg{background:#e0f2f1;color:#00695c}.bc-drink{background:#e8eaf6;color:#3949ab}.bc-sake{background:#ede7f6;color:#512da8}.bc-soy{background:#fff3e0;color:#e65100}.bc-dispose{background:#efebe9;color:#4e342e}.bc-other{background:var(--light);color:var(--mid)}.bc-akt{background:#f3f8f3;color:#2a5c3f}
.tax-8{background:#e8f5e9;color:#2a5c3f;font-size:9px;padding:1px 6px;border-radius:10px;font-weight:700}
.tax-10{background:#fff3e0;color:#e65100;font-size:9px;padding:1px 6px;border-radius:10px;font-weight:700}
/* レシピカード */
.rc-card{background:var(--card);border-radius:13px;box-shadow:0 2px 10px var(--shadow);margin:0 12px 8px;overflow:hidden;cursor:pointer;transition:transform .15s}
.rc-card:active{transform:scale(.99)}
.rc-head{padding:12px 14px 9px;border-bottom:1px solid var(--line)}
.rc-name{font-family:"Shippori Mincho B1",serif;font-size:14px;font-weight:700;margin-bottom:5px;line-height:1.3}
.rc-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.rc-cost{display:flex;gap:10px;padding:9px 14px;background:var(--gxl);align-items:center}
.cost-val{font-family:"Shippori Mincho B1",serif;font-size:15px;font-weight:800;color:var(--gd)}
.cost-lbl{font-size:10px;color:var(--mid)}
/* 食材カード */
.ing-card{background:var(--card);border-radius:13px;box-shadow:0 2px 10px var(--shadow);margin:0 12px 8px;overflow:hidden}
.ic-head{display:flex;align-items:center;justify-content:space-between;padding:11px 14px 9px;border-bottom:1px solid var(--line);cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:rgba(42,92,63,.08);user-select:none;-webkit-user-select:none;min-height:50px}
.ic-name{font-family:"Shippori Mincho B1",serif;font-size:14px;font-weight:700;flex:1;margin-right:8px;line-height:1.3}
.ic-badges{display:flex;gap:5px;align-items:center;flex-shrink:0}
.chevron{font-size:14px;color:var(--mid);margin-left:4px;transition:transform .2s;display:inline-block}
.ic-price{padding:8px 14px;background:var(--gxl)}
.price-val{font-family:"Shippori Mincho B1",serif;font-size:16px;font-weight:800;color:var(--gd)}
.price-real{font-family:"Shippori Mincho B1",serif;font-size:14px;font-weight:800;color:var(--gold)}
.price-unit{font-size:11px;color:var(--mid)}
.yield-badge{font-size:10px;background:#fff3cd;color:#7a5a00;padding:1px 7px;border-radius:10px;font-weight:700}
.ic-expand{display:none}
.ic-expand.open{display:block}
/* 編集フォーム */
.edit-form{background:var(--gxl);border-top:1px solid var(--gl);padding:12px 14px}
.ef-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ef-lbl{font-size:10px;font-weight:700;color:var(--mid);letter-spacing:.1em;min-width:56px;flex-shrink:0}
.ef-inp{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;font-size:14px;font-family:"Zen Kaku Gothic New",sans-serif;color:var(--ink);background:#fff;outline:none;-webkit-appearance:none;min-height:38px}
.ef-inp:focus{border-color:var(--gm)}
.ef-sub{font-size:11px;color:var(--mid);flex-shrink:0}
.ef-btns{display:flex;gap:8px;margin-top:4px}
.btn-ef{flex:1;padding:11px;border:none;border-radius:9px;font-family:"Shippori Mincho B1",serif;font-size:13px;font-weight:700;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;min-height:44px}
.btn-ef-g{background:var(--gd);color:#fff}
.btn-ef-r{background:#fff;color:var(--red);border:1.5px solid var(--red)}
/* ボトムバー */
.bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:rgba(248,244,237,.98);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);border-top:1px solid var(--border);padding:9px 12px env(safe-area-inset-bottom,9px);display:flex;gap:7px;z-index:300}
.btn-main{flex:2;padding:13px;border:none;border-radius:12px;font-family:"Shippori Mincho B1",serif;font-size:13px;font-weight:700;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;min-height:48px}
.btn-m-g{background:var(--gd);color:#fff;box-shadow:0 4px 12px rgba(42,92,63,.28)}
.btn-sub{flex:1;padding:13px;border:1.5px solid var(--border);border-radius:12px;background:#fff;font-family:"Shippori Mincho B1",serif;font-size:12px;font-weight:700;cursor:pointer;color:var(--mid);touch-action:manipulation;-webkit-tap-highlight-color:transparent;min-height:48px}
.btn-sub.danger{color:var(--red);border-color:var(--red)}
/* モーダル */
.modal-overlay{position:fixed;inset:0;background:rgba(28,22,18,.5);z-index:400;display:none;align-items:flex-end}
.modal-overlay.open{display:flex;animation:fadeIn .2s ease}
.modal-box{background:var(--cream);border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:18px 14px calc(32px + env(safe-area-inset-bottom,0px))}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px}
.modal-title{font-family:"Shippori Mincho B1",serif;font-size:17px;font-weight:800;margin-bottom:14px;letter-spacing:.05em}
/* レシピ編集フォーム */
.sec-hd{background:var(--gm);padding:10px 14px;border-radius:10px 10px 0 0;display:flex;align-items:center;justify-content:space-between}
.sec-hd-gold{background:var(--gold)}
.sec-hd-ttl{font-family:"Shippori Mincho B1",serif;font-size:13px;font-weight:700;color:#fff;letter-spacing:.08em}
.sec-body{background:var(--card);border-radius:0 0 10px 10px;padding:10px 12px;margin-bottom:10px;box-shadow:0 2px 8px var(--shadow)}
.frow{display:flex;align-items:stretch;border-bottom:1px solid var(--line);min-height:44px}
.frow:last-child{border-bottom:none}
.flbl{width:72px;flex-shrink:0;display:flex;align-items:center;padding:7px 6px 7px 0;font-size:10px;font-weight:700;color:var(--mid);letter-spacing:.1em;border-right:1px solid var(--line)}
.finp{flex:1;border:none;outline:none;padding:7px 10px;font-family:"Zen Kaku Gothic New",sans-serif;font-size:14px;color:var(--ink);background:transparent;-webkit-appearance:none;resize:none;overflow:hidden;min-height:42px;line-height:1.5}
.finp:focus{background:var(--gxl)}
/* 原価サマリー */
.cost-summary{background:var(--gold-l);border:1px solid #e8d9a8;border-radius:12px;padding:12px 14px;margin-bottom:10px}
.cs-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.cs-lbl{font-size:11px;color:var(--mid)}
.cs-val{font-family:"Shippori Mincho B1",serif;font-size:16px;font-weight:800;color:var(--gold)}
/* 食材行（レシピ内） */
.ri-row{display:grid;grid-template-columns:1fr 70px 50px 60px 24px;gap:5px;align-items:center;padding:6px 0;border-bottom:1px solid var(--line)}
.ri-row:last-child{border-bottom:none}
.ri-row input,.ri-row select{border:1px solid var(--border);border-radius:6px;padding:4px 6px;font-size:13px;font-family:"Zen Kaku Gothic New",sans-serif;color:var(--ink);background:#fff;outline:none;width:100%;-webkit-appearance:none}
/* 手順行 */
.step-row{display:flex;gap:8px;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--line)}
.step-row:last-child{border-bottom:none}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--gd);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
/* 納品書 */
.inv-panel{display:none;padding:12px}
.inv-panel.open{display:block}
.upload-zone{border:2px dashed var(--border);border-radius:14px;padding:24px 14px;text-align:center;cursor:pointer;background:var(--light);margin-bottom:10px;position:relative}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.inv-status{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700;white-space:nowrap}
.is-new{background:#e1f5ee;color:#0f6e56}.is-update{background:#faeeda;color:#854f0b}.is-same{background:#f1f1f1;color:#888}
/* ユーティリティ */
.spinner{width:32px;height:32px;border:3px solid var(--gl);border-top-color:var(--gd);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.toast{position:fixed;bottom:calc(72px + env(safe-area-inset-bottom,10px) + 8px);left:50%;transform:translateX(-50%);background:#2a5c3f;color:#fff;padding:9px 18px;border-radius:22px;font-family:"Shippori Mincho B1",serif;font-size:12px;letter-spacing:.1em;box-shadow:0 4px 14px rgba(0,0,0,.2);z-index:500;animation:fadeIn .2s ease;pointer-events:none;white-space:nowrap}

/* 食材検索セレクター */
.ing-picker{position:relative}
.ing-picker-btn{width:100%;border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:13px;font-family:"Zen Kaku Gothic New",sans-serif;background:#fff;text-align:left;cursor:pointer;color:var(--ink);min-height:34px;display:flex;align-items:center;justify-content:space-between;gap:4px}
.ing-picker-btn .ipb-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.ing-picker-btn .ipb-arrow{color:var(--mid);font-size:10px;flex-shrink:0}
.ing-picker-pop{position:fixed;inset:0;background:rgba(28,22,18,.5);z-index:600;display:none;align-items:flex-end}
.ing-picker-pop.open{display:flex;animation:fadeIn .2s ease}
.ipp-box{background:var(--cream);border-radius:20px 20px 0 0;width:100%;max-width:520px;margin:0 auto;max-height:80vh;display:flex;flex-direction:column;padding:14px 14px calc(20px + env(safe-area-inset-bottom,0px))}
.ipp-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 12px}
.ipp-search{width:100%;height:44px;border:1.5px solid var(--gm);border-radius:10px;padding:0 14px;font-size:15px;font-family:"Zen Kaku Gothic New",sans-serif;color:var(--ink);background:#fff;outline:none;margin-bottom:8px;-webkit-appearance:none}
.ipp-cats{display:flex;gap:5px;overflow-x:auto;padding-bottom:6px;margin-bottom:6px}
.ipp-cats::-webkit-scrollbar{display:none}
.ipp-cat{flex-shrink:0;padding:4px 11px;border:1.5px solid var(--border);border-radius:16px;background:#fff;font-size:11px;color:var(--mid);cursor:pointer;white-space:nowrap}
.ipp-cat.on{background:var(--gd);border-color:var(--gd);color:#fff;font-weight:700}
.ipp-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.ipp-item{padding:11px 12px;border-bottom:1px solid var(--line);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:space-between;gap:8px;min-height:46px}
.ipp-item:active{background:var(--gxl)}
.ipp-item .ipi-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ipp-item .ipi-price{font-size:11px;color:var(--gd);font-weight:700;flex-shrink:0}
.ipp-item .ipi-cat{font-size:9px;background:var(--gl);color:var(--gd);padding:1px 7px;border-radius:10px;flex-shrink:0}
.ipp-empty{text-align:center;padding:30px;color:var(--mid);font-size:13px}
.ipp-close{margin-top:8px;padding:11px;border:1.5px solid var(--border);border-radius:10px;background:#fff;font-family:"Shippori Mincho B1",serif;font-size:13px;cursor:pointer;color:var(--mid);width:100%}

</style>
</head>
<body>
<div class="page">

<div class="top-bar">
  <div>
    <span class="top-shop">Café照</span>
    <div class="top-title">レシピ管理システム</div>
  </div>
  <div style="display:flex;gap:6px;flex-direction:column;align-items:flex-end">
    <button class="cloud-btn" onclick="openGasSettings()">☁️ クラウド設定</button>
    <button class="cloud-btn" onclick="openApiKeySettings()" style="background:rgba(255,255,255,.12)">🔑 APIキー</button>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn on" id="tab-recipe" onclick="switchTab('recipe')"><span class="ico">📖</span>レシピ</button>
  <button class="tab-btn" id="tab-ing" onclick="switchTab('ing')"><span class="ico">🧂</span>食材マスター</button>
  <button class="tab-btn" id="tab-invoice" onclick="switchTab('invoice')"><span class="ico">📷</span>納品書</button>
</div>

<!-- ====== レシピタブ ====== -->
<div id="pane-recipe">
  <div class="toolbar">
    <div class="search-row">
      <input class="search-inp" id="recipe-q" placeholder="レシピを検索..." oninput="renderRecipes()">
      <button class="btn-add" onclick="openRecipeEdit(null)">＋ 新規</button>
    </div>
    <div class="cat-scroll" id="recipe-cat-btns"></div>
  </div>
  <div class="count-bar"><span>表示中 <strong id="recipe-count">–</strong> 件</span><span style="font-size:10px">タップで詳細</span></div>
  <div id="recipe-list"></div>
</div>

<!-- ====== 食材マスタータブ ====== -->
<div id="pane-ing" style="display:none">
  <div class="toolbar">
    <div class="search-row">
      <input class="search-inp" id="ing-q" placeholder="食材名・業者で検索..." oninput="renderIngs()">
      <button class="btn-add" onclick="addNewIng()">＋ 追加</button>
    </div>
    <div class="cat-scroll" id="ing-cat-btns"></div>
  </div>
  <div class="count-bar"><span>表示中 <strong id="ing-count">–</strong> 品目</span><span style="font-size:10px">タップで展開・編集</span></div>
  <div id="ing-list"></div>
</div>

<!-- ====== 納品書タブ ====== -->
<div id="pane-invoice" class="inv-panel">
  <div style="padding:10px 0 10px">
    <div style="font-family:'Shippori Mincho B1',serif;font-size:15px;font-weight:700;margin-bottom:4px">📷 納品書から単価を取り込む</div>
    <div style="font-size:12px;color:var(--mid);line-height:1.7">紙の納品書を撮影するだけ。AIが商品名・単価を自動認識して食材マスターに上書き保存します。</div>
  </div>
  <div class="upload-zone" ondragover="event.preventDefault()" ondrop="handleInvDrop(event)">
    <div style="font-size:32px;margin-bottom:6px">📷</div>
    <div style="font-family:'Shippori Mincho B1',serif;font-size:14px;font-weight:700;margin-bottom:3px">今すぐ撮影 または 写真を選ぶ</div>
    <div style="font-size:11px;color:var(--mid)">JPG・PNG・PDF対応</div>
    <input type="file" accept="image/*,.pdf" capture="environment" id="inv-file" onchange="handleInvFile(event)">
  </div>
  <div id="inv-preview-wrap" style="display:none;margin-bottom:10px">
    <img id="inv-preview-img" style="width:100%;max-height:180px;object-fit:contain;border-radius:10px;border:1px solid var(--border)">
  </div>
  <div id="inv-err" style="background:#fdf0ee;border:1px solid #e8b4a8;border-radius:9px;padding:10px 14px;font-size:12px;color:var(--red);display:none;margin-bottom:8px"></div>
  <button class="btn-main btn-m-g" id="inv-btn" onclick="analyzeInvoice()" disabled style="width:100%;margin-bottom:8px;opacity:.45;cursor:not-allowed">🤖 AIで読み取る</button>
  <div id="inv-loading" style="display:none;text-align:center;padding:16px"><div class="spinner"></div><div style="font-size:12px;color:var(--mid)">AIが解析中...</div></div>
  <div id="inv-result-wrap" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px">
      <div style="font-family:'Shippori Mincho B1',serif;font-size:14px;font-weight:700">読み取り結果</div>
      <div id="inv-summary" style="font-size:11px;color:var(--mid)"></div>
    </div>
    <div class="card" style="margin:0 0 10px;padding:10px 12px">
      <div style="display:grid;grid-template-columns:1fr 80px 50px 60px;gap:5px;padding:3px 0 6px;font-size:9px;font-weight:700;color:var(--mid);border-bottom:1px solid var(--border)">

let GAS_URL = localStorage.getItem('cafe_teru_gas') || '';
let _store = null;

function defaultStore(){ return { ingredients: JSON.parse(JSON.stringify(DEFAULT_INGS)), recipes: [] }; }

function load(){
  if(_store) return _store;
  try{ _store = JSON.parse(localStorage.getItem('cafe_teru_v2')||'null') || defaultStore(); }
  catch(e){ _store = defaultStore(); }
  return _store;
}

// 食材マスターを保存（ももやん専用）
async function saveIngredients(){
  const s = load();
  localStorage.setItem('cafe_teru_v2', JSON.stringify(s));
  if(GAS_URL){
    try{
      await fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},
        body:JSON.stringify({action:'save_ingredients', data:{ ingredients: s.ingredients }})});
    }catch(e){}
  }
  showToast('✅ 食材マスターを保存しました');
}

// レシピを保存（スタッフも使用可）
async function saveRecipes(){
  const s = load();
  // ローカルに保存
  localStorage.setItem('cafe_teru_v2', JSON.stringify(s));
  // レシピだけGASに送る（食材には一切触らない）
  if(GAS_URL){
    try{
      await fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},
        body:JSON.stringify({action:'save_recipes', data:{ recipes: s.recipes }})});
    }catch(e){}
  }
  showToast('✅ レシピを保存しました');
}

async function saveAll(){
  await saveRecipes();
}

// IDをキーにして2つの配列をマージ（後者優先）
function mergeById(local, remote){
  const map = new Map();
  // ローカルを先に入れる
  (local||[]).forEach(item => map.set(String(item.id), item));
  // リモートで上書き（リモート優先）
  (remote||[]).forEach(item => map.set(String(item.id), item));
  return Array.from(map.values());
}

async function syncNow(){
  if(!GAS_URL){ openGasSettings(); return; }
  showToast('🔄 同期中...');
  try{
    const res = await fetch(GAS_URL+'?t='+Date.now(),{method:'GET',mode:'cors'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const json = await res.json();
    const s = load();
    let msg = [];

    const gasIngs = json.ok && json.data && json.data.ingredients ? json.data.ingredients : [];
    const gasRecs = json.ok && json.data && json.data.recipes    ? json.data.recipes    : [];

    if(gasIngs.length > 0){
      // GASとローカルをマージ（GAS優先）→ 追加した食材も残る
      const merged = mergeById(s.ingredients, gasIngs);
      s.ingredients = merged;
      msg.push('食材 '+merged.length+'品目');
      // マージ結果をGASに書き戻す
      fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},
        body:JSON.stringify({action:'save_ingredients',data:{ingredients:merged}})});
    } else if(s.ingredients.length > 0){
      // GASが空 → ローカルをそのままGASに送る
      fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},
        body:JSON.stringify({action:'save_ingredients',data:{ingredients:s.ingredients}})});
      msg.push('食材をGASに登録');
    }

    if(gasRecs.length > 0){
      // GASとローカルをマージ（GAS優先）
      const merged = mergeById(s.recipes, gasRecs);
      s.recipes = merged;
      msg.push('レシピ '+merged.length+'件');
      // マージ結果をGASに書き戻す
      fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},
        body:JSON.stringify({action:'save_recipes',data:{recipes:merged}})});
    } else if(s.recipes && s.recipes.length > 0){
      fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},
        body:JSON.stringify({action:'save_recipes',data:{recipes:s.recipes}})});
      msg.push('レシピをGASに登録');
    }

    _store = s;
    localStorage.setItem('cafe_teru_v2', JSON.stringify(s));
    renderIngs(); renderRecipes();
    showToast('✅ '+( msg.length ? msg.join(' / ') : '同期完了'));

  }catch(e){ showToast('⚠️ 同期失敗: '+e.message); }
}

function openGasSettings(){
  const url = prompt('Google Apps ScriptのURLを入力してください\n（空欄でクリア）', GAS_URL||''  );
  if(url===null) return;
  GAS_URL = url.trim();
  localStorage.setItem('cafe_teru_gas', GAS_URL);
  if(GAS_URL) showToast('✅ 設定しました。保存ボタンでGASに送ってください');
  else showToast('クリアしました');
}

function openApiKeySettings(){
  const cur = localStorage.getItem('cafe_teru_apikey') || '';
  const masked = cur ? cur.slice(0,14)+'...'+cur.slice(-4) : '（未設定）';
  const key = prompt(
    'Anthropic APIキーを貼り付けてください\n' +
    'sk-ant-api03-... で始まる文字列です\n\n' +
    '※このキーはこの端末のブラウザだけに保存され、\n' +
    '　GitHubやスタッフには共有されません。\n\n' +
    '現在の設定：' + masked + '\n\n' +
    '（空欄でクリア）',
    cur
  );
  if(key===null) return;
  const k = key.trim();
  localStorage.setItem('cafe_teru_apikey', k);
  if(k){
    if(k.startsWith('sk-ant-')){
      showToast('✅ APIキーを設定しました。納品書の自動読み取りが使えます');
    } else {
      showToast('⚠️ キーの形式が違うようです（sk-ant-... で始まります）');
    }
  } else {
    showToast('APIキーをクリアしました');
  }
}

function initCatBtns(containerId, cats, getActive, setActive, renderFn){
  const wrap = document.getElementById(containerId);
  cats.forEach(c=>{
    const b=document.createElement('button');
    b.className='cat-btn'+(c==='すべて'?' on':'');
    b.textContent=c;
    b.addEventListener('click',function(){
      setActive(c);
      wrap.querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      renderFn();
    });
    wrap.appendChild(b);
  });
  // ホイールスクロール
  wrap.addEventListener('wheel',function(e){ if(e.deltaY!==0){e.preventDefault();wrap.scrollLeft+=e.deltaY*1.5;} },{passive:false});
  let isDn=false,stX=0,slX=0;
  wrap.addEventListener('mousedown',e=>{isDn=true;stX=e.pageX-wrap.offsetLeft;slX=wrap.scrollLeft;});
  document.addEventListener('mouseup',()=>isDn=false);
  wrap.addEventListener('mousemove',e=>{if(!isDn)return;e.preventDefault();wrap.scrollLeft=slX-(e.pageX-wrap.offsetLeft-stX);});
}

// ===================================================
// 原価計算
// ===================================================
function calcCost(recipe){
  const s = load();
  let total = 0;
  (recipe.ingredients||[]).forEach(ri=>{
    const ing = s.ingredients.find(i=>i.id===ri.ingId);
    if(!ing) return;
    // 食材マスターの歩留まり率（レシピ行で上書きあれば優先）
    const yr = ri.yieldRate > 0 && ri.yieldRate < 100 ? ri.yieldRate :
               (ing.yieldRate > 0 && ing.yieldRate < 100 ? ing.yieldRate : 100);
    const realPrice = ing.unitPrice / (yr / 100);
    total += realPrice * ri.qty;
  });
  return { exTax: total, incTax: total * 1.08 };
}

function calcPortions(recipe){
  if(!recipe.servingQty || !recipe.baseQty || recipe.baseQty<=0) return null;
  return Math.floor(recipe.baseQty / recipe.servingQty);
}

function renderRecipes(){
  const s = load();
  const q = (document.getElementById('recipe-q')?.value||''). trim().toLowerCase();
  const filtered = s.recipes.filter(r=>{
    if(activeRcCat!=='すべて' && r.category!==activeRcCat) return false;
    if(q && !r.name.toLowerCase().includes(q)) return false;
    return true;
  });
  document.getElementById('recipe-count').textContent = filtered.length;
  const list = document.getElementById('recipe-list');
  list.innerHTML='';
  if(!filtered.length){
    list.innerHTML='<div style="text-align:center;padding:36px 14px;color:var(--mid);font-size:13px;line-height:2">レシピがありません<br><span style="font-size:11px">＋ レシピ追加から登録してください</span></div>';
    return;
  }
  filtered.forEach(r=>{
    const {exTax,incTax}=calcCost(r);
    const portions=calcPortions(r);
    const card=document.createElement('div'); card.className='rc-card';
    card.innerHTML=
      '<div class="rc-head">'+
        '<div class="rc-name">'+esc(r.name)+'</div>'+
        '<div class="rc-meta">'+
          '<span class="badge bc-season">'+esc(r.category||'未分類')+'</span>'+

          (portions?'<span class="badge" style="background:var(--gold-l);color:var(--gold)">'+portions+'人前</span>':'')+
        '</div>'+
      '</div>'+
      '<div class="rc-cost">'+

        '<div style="margin-left:12px"><div class="cost-lbl">税込原価</div><div class="cost-val">'+fmtY(incTax)+'</div></div>'+

// ===================================================
// 食材検索ピッカー
// ===================================================
let _pickerTargetBtn = null;
let _pickerCat = 'すべて';

function openIngPicker(btn){
  _pickerTargetBtn = btn;
  _pickerCat = 'すべて';
  document.getElementById('ipp-search').value = '';
  // カテゴリボタン生成
  const catWrap = document.getElementById('ipp-cats');
  catWrap.innerHTML = ING_CATS.map(c =>
    '<button class="ipp-cat'+(c==='すべて'?' on':'')+'" onclick="pickerSetCat(this,\''+c+'\')">'+c+'</button>'
  ).join('');
  renderPickerList();
  document.getElementById('ing-picker-pop').classList.add('open');
  setTimeout(()=>document.getElementById('ipp-search').focus(), 100);
}

function pickerSetCat(el, cat){
  _pickerCat = cat;
  document.querySelectorAll('#ipp-cats .ipp-cat').forEach(x=>x.classList.remove('on'));
  el.classList.add('on');
  renderPickerList();
}

function renderPickerList(){
  const s = load();
  const q = (document.getElementById('ipp-search').value||'').trim().toLowerCase();
  const filtered = s.ingredients.filter(i=>{
    if(_pickerCat!=='すべて' && i.category!==_pickerCat) return false;
    if(q && !i.name.toLowerCase().includes(q) && !(i.supplier||'').toLowerCase().includes(q)) return false;
    return true;
  });
  const list = document.getElementById('ipp-list');
  if(!filtered.length){
    list.innerHTML = '<div class="ipp-empty">該当する食材がありません</div>';
    return;
  }
  list.innerHTML = filtered.map(i=>
    '<div class="ipp-item" onclick="selectIng('+i.id+')">'+
      '<span class="ipi-name">'+esc(i.name)+'</span>'+
      '<span class="ipi-cat">'+esc(i.category||'その他')+'</span>'+
      '<span class="ipi-price">¥'+i.unitPrice.toLocaleString('ja-JP',{maximumFractionDigits:4})+'/'+esc(i.unit)+'</span>'+
    '</div>'
  ).join('');
}

function selectIng(ingId){
  const s = load();
  const ing = s.ingredients.find(i=>i.id===ingId);
  if(!ing || !_pickerTargetBtn) return;
  // ボタンの表示を更新
  _pickerTargetBtn.dataset.ingid = ingId;
  _pickerTargetBtn.querySelector('.ipb-name').textContent = ing.name;
  // 同じ行の単位を自動入力
  const row = _pickerTargetBtn.closest('.ri-row');
  if(row){
    const unitInp = row.querySelector('input[data-rf="unit"]');
    if(unitInp && (!unitInp.value || unitInp.value==='g')) unitInp.value = ing.unit;
    const yrInp = row.querySelector('input[data-rf="yieldRate"]');
    if(yrInp) yrInp.value = (ing.yieldRate && ing.yieldRate<100) ? ing.yieldRate : 100;
  }
  closeIngPicker();
  updateRiCost();
}

function closeIngPicker(){
  document.getElementById('ing-picker-pop').classList.remove('open');
  _pickerTargetBtn = null;
}

function updateRiCost(){
  const s=load();
  let total=0;
  document.querySelectorAll('#re-ing-list .ri-row').forEach(row=>{
    const btn=row.querySelector('.ing-picker-btn[data-rf="ingId"]');
    const qtyInp=row.querySelector('input[data-rf="qty"]');
    const yrInp=row.querySelector('input[data-rf="yieldRate"]');
    const ing=s.ingredients.find(i=>i.id===parseInt(btn?.dataset.ingid));
    if(!ing||!qtyInp) return;
    const yr=parseFloat(yrInp?.value)||100;
    const realP=ing.unitPrice/(yr/100);
    const cost=realP*(parseFloat(qtyInp.value)||0);
    total+=cost;
  });
  const ex=document.getElementById('re-cost-ex'); if(ex) ex.textContent=fmtY(total);
  const inc=document.getElementById('re-cost-in'); if(inc) inc.textContent=fmtY(total*1.08);
  const det=document.getElementById('re-cost-detail'); if(det) det.textContent='合計原価（税抜）：'+fmtY(total);
}

function saveRecipeEdit(origId){
  const s=load();
  const name=(document.getElementById('re-name')?.value||''). trim();
  if(!name){ alert('レシピ名を入力してください'); return; }
  const ings=[];
  document.querySelectorAll('#re-ing-list .ri-row').forEach(row=>{
    const btn=row.querySelector('.ing-picker-btn[data-rf="ingId"]');
    const qtyInp=row.querySelector('input[data-rf="qty"]');
    const unitInp=row.querySelector('input[data-rf="unit"]');
    const yrInp=row.querySelector('input[data-rf="yieldRate"]');
    const ingId=parseInt(btn?.dataset.ingid);
    if(!ingId) return;
    ings.push({ingId:ingId,qty:parseFloat(qtyInp?.value)||0,unit:unitInp?.value||'g',yieldRate:parseFloat(yrInp?.value)||100});
  });
  const steps=[];
  document.querySelectorAll('#re-step-list .step-row').forEach(row=>{
    const ta=row.querySelector('textarea');
    const inputs=row.querySelectorAll('input');
    const sel=row.querySelector('select');
    steps.push({text:(ta?.value||''). trim(),prepTime:(inputs[0]?.value||''). trim(),taskType:sel?.value||'仕込み'});
  });
  const rec={
    id:origId||Date.now(),
    name,
    category:document.getElementById('re-cat')?.value||'その他',
    baseQty:parseFloat(document.getElementById('re-qty')?.value)||0,
    baseUnit:document.getElementById('re-unit')?.value||'g',
    baseServings:parseInt(document.getElementById('re-servings')?.value)||1,
    servingQty:parseFloat(document.getElementById('re-srvqty')?.value)||null,
    notes:(document.getElementById('re-notes')?.value||''). trim(),
    ingredients:ings,steps,
    updatedAt:new Date().toLocaleString('ja-JP'),
  };
  if(origId){ const idx=s.recipes.findIndex(x=>x.id===origId); if(idx>=0) s.recipes[idx]=rec; else s.recipes.unshift(rec); }
  else s.recipes.unshift(rec);
  saveRecipes(); closeRecipeModal(); renderRecipes();
  showToast('✅ '+(origId?'保存しました':'登録しました'));
}

function deleteRecipe(id){
  if(!confirm('このレシピを削除しますか？')) return;
  load().recipes=load().recipes.filter(r=>r.id!==id);
  saveRecipes(); closeRecipeModal(); renderRecipes(); showToast('削除しました');
}

      '</div>'+
      '<div class="ef-row"><span class="ef-lbl">歩留まり</span>'+
        '<input class="ef-inp" type="number" min="1" max="100" step="0.1" value="'+yr+'" data-field="yieldRate" style="max-width:75px">'+
        '<span class="ef-sub">%　（100%=歩留なし）</span>'+
      '</div>'+
      '<div class="ef-row"><span class="ef-lbl">カテゴリ</span><select class="ef-inp" data-field="category">'+catOpts+'</select></div>'+
      '<div class="ef-row"><span class="ef-lbl">税率</span>'+
        '<select class="ef-inp" data-field="taxRate" style="max-width:80px">'+
          '<option value="0.08"'+(ing.taxRate!==0.1?' selected':'')+'>8%</option>'+
          '<option value="0.1"'+(ing.taxRate===0.1?' selected':'')+'>10%</option>'+
        '</select></div>'+
      '<div class="ef-btns">'+
        '<button class="btn-ef btn-ef-g" data-action="save">💾 保存</button>'+
        '<button class="btn-ef btn-ef-r" data-action="delete">削除</button>'+
      '</div>';
    form.querySelector('[data-action="save"]').addEventListener('click',()=>saveIngCard(card,ing.id));
    form.querySelector('[data-action="delete"]').addEventListener('click',()=>deleteIng(ing.id));
    expand.appendChild(form); card.appendChild(head); card.appendChild(priceDiv); card.appendChild(expand);
    list.appendChild(card);
  });
}

function toggleIngCard(card){
  const expand=card.querySelector('.ic-expand');
  const chevron=card.querySelector('.chevron');
  const isOpen=expand.classList.contains('open');
  document.querySelectorAll('.ic-expand.open').forEach(el=>{
    el.classList.remove('open');
    const ch=el.closest('.ing-card')?.querySelector('.chevron');
    if(ch){ ch.textContent='›'; ch.classList.remove('open'); }
  });
  if(!isOpen){ expand.classList.add('open'); chevron.textContent='∨'; chevron.classList.add('open'); setTimeout(()=>expand.scrollIntoView({behavior:'smooth',block:'nearest'}),50); }
}

function saveIngCard(card,ingId){
  const s=load(); const ing=s.ingredients.find(i=>i.id===ingId); if(!ing) return;
  card.querySelectorAll('[data-field]').forEach(el=>{
    const f=el.dataset.field; const v=el.value;
    ing[f]=(f==='unitPrice'||f==='taxRate'||f==='yieldRate')?parseFloat(v)||0:v;
  });
  saveIngredients(); renderIngs(); showToast('✅ 食材を保存しました');
}

function deleteIng(ingId){
  if(!confirm('この食材を削除しますか？')) return;
  load().ingredients=load().ingredients.filter(i=>i.id!==ingId);
  renderIngs(); showToast('削除しました（保存ボタンで確定）');
}

function addNewIng(){
  const s=load();
  const maxId=s.ingredients.reduce((m,i)=>Math.max(m,i.id),0);
  s.ingredients.unshift({id:maxId+1,name:'',supplier:'',unitPrice:0,unit:'g',taxRate:0.08,yieldRate:100,category:'その他'});
  renderIngs();
  setTimeout(()=>{
    const firstCard=document.querySelector('.ing-card');
    if(firstCard){ toggleIngCard(firstCard); const inp=firstCard.querySelector('.ef-inp'); if(inp) inp.focus(); }
  },50);
}

function exportIngCSV(){
  const s=load();
  const rows=[['ID','食材名','業者','仕入単価','単位','歩留まり%','税率','カテゴリ']];
  s.ingredients.forEach(i=>rows.push([i.id,i.name,i.supplier||'',i.unitPrice,i.unit,i.yieldRate||100,i.taxRate===0.08?'8%':'10%',i.category||'']));
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"'). join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download='食材マスター_'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
  showToast('📥 CSVをダウンロードしました');
}

// ===================================================
// 納品書AI
// ===================================================
let invState={};
function handleInvDrop(e){ e.preventDefault(); if(e.dataTransfer.files[0]) processInvFile(e.dataTransfer.files[0]); }
function handleInvFile(e){ if(e.target.files[0]) processInvFile(e.target.files[0]); }
function processInvFile(file){
  const reader=new FileReader();
  reader.onload=ev=>{
    invState={b64:ev.target.result,mime:file.type||'image/jpeg'};
    document.getElementById('inv-preview-img').src=ev.target.result;
    document.getElementById('inv-preview-wrap').style.display='';
    const btn=document.getElementById('inv-btn'); btn.disabled=false; btn.style.opacity='1'; btn.style.cursor='pointer';
    document.getElementById('inv-err').style.display='none';
    document.getElementById('inv-result-wrap').style.display='none';
  };
  reader.readAsDataURL(file);
}
async function analyzeInvoice(){
  if(!invState.b64) return;
  const apiKey = localStorage.getItem('cafe_teru_apikey') || '';
  if(!apiKey){
    const err=document.getElementById('inv-err');
    err.textContent='⚠️ APIキーが未設定です。右上「☁️ クラウド設定」の隣の「🔑 APIキー」ボタンから設定してください。';
    err.style.display='';
    return;
  }
  const btn=document.getElementById('inv-btn'); btn.disabled=true; btn.style.opacity='.5';
  document.getElementById('inv-loading').style.display='';
  document.getElementById('inv-result-wrap').style.display='none';
  document.getElementById('inv-err').style.display='none';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{
        'Content-Type':'application/json',
        'x-api-key':apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:3000,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:invState.mime,data:invState.b64.split(',')[1]}},
          {type:'text',text:'この納品書から食材情報を全て抽出してください。JSONのみ返してください（前置き・コードブロック不要）:\n[{"name":"商品名","supplier":"業者名","unitPrice":1単位あたりの数値,"unit":"g or ml or 個 or 本 or 袋 or 尾","taxRate":0.08}]\n単価換算: 1kg=2000円→unitPrice:2,unit:"g" / 500ml=750円→unitPrice:1.5,unit:"ml"\n除外: 合計・送料・税額行。JSONのみ。'}
        ]}]})
    });
    const data=await res.json();
    if(data.error) throw new Error(data.error.message);
    const raw=data.content?.[0]?.text||'[]';
    const items=JSON.parse(raw.replace(/```json?/g,'').replace(/```/g,'').trim());
    invState.items=items; renderInvResult(items);
  }catch(e){ const err=document.getElementById('inv-err'); err.textContent='⚠️ '+e.message; err.style.display=''; }
  finally{ btn.disabled=false; btn.style.opacity='1'; document.getElementById('inv-loading').style.display='none'; }
}
function renderInvResult(items){
  const s=load();
  const UNIT_NORM={'ｇ':'g','Ｇ':'g','㎖':'ml','ｍｌ':'ml','ｋｇ':'kg','㎏':'kg'};
  let nc=0,uc=0,sc=0;
  const list=document.getElementById('inv-result-list'); list.innerHTML='';
  items.forEach(item=>{
    item.unit=UNIT_NORM[item.unit]||item.unit||'g';
    const ex=s.ingredients.find(i=>i.name.replace(/\s/g,'')=== item.name.replace(/\s/g,'')||i.name.includes(item.name)||item.name.includes(i.name));
    let st,sc2;
    if(!ex){st='新規';sc2='is-new';nc++;}else if(Math.abs(ex.unitPrice-item.unitPrice)>0.0001){st='更新';sc2='is-update';uc++;}else{st='変更なし';sc2='is-same';sc++;}
    const row=document.createElement('div'); row.className='inv-result-row';
    row.innerHTML='<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(item.name)+'</div>'+(ex&&st==='更新'?'<div style="font-size:10px;color:var(--mid);text-decoration:line-through">¥'+ex.unitPrice+'/'+esc(ex.unit||'g')+'</div>':'')+'</div><div style="font-size:13px;font-weight:700;color:var(--gd);white-space:nowrap">¥'+item.unitPrice+'</div><div style="font-size:12px;color:var(--mid)">'+esc(item.unit)+'</div><span class="inv-status '+sc2+'">'+st+'</span>';
    list.appendChild(row);
  });
  document.getElementById('inv-summary').textContent='新規 '+nc+' / 更新 '+uc+' / 変更なし '+sc;
  document.getElementById('inv-result-wrap').style.display='';
}
function applyInvoice(){
  const s=load();
  (invState.items||[]).forEach(item=>{
    const idx=s.ingredients.findIndex(i=>i.name.replace(/\s/g,'')===item.name.replace(/\s/g,'')||i.name.includes(item.name)||item.name.includes(i.name));
    if(idx>=0){ s.ingredients[idx].unitPrice=item.unitPrice; s.ingredients[idx].unit=item.unit||s.ingredients[idx].unit; if(item.supplier) s.ingredients[idx].supplier=item.supplier; }
    else{ const maxId=s.ingredients.reduce((m,i)=>Math.max(m,i.id),0); s.ingredients.push({id:maxId+1,name:item.name,supplier:item.supplier||'',unitPrice:item.unitPrice,unit:item.unit||'g',taxRate:item.taxRate||0.08,yieldRate:100,category:'その他'}); }
  });
  saveAll(); resetInvoice(); switchTab('ing'); renderIngs(); showToast('✅ 食材マスターを更新しました');
}
function resetInvoice(){
  invState={};
  document.getElementById('inv-preview-wrap').style.display='none';
  document.getElementById('inv-result-wrap').style.display='none';
  const btn=document.getElementById('inv-btn'); btn.disabled=true; btn.style.opacity='.45'; btn.style.cursor='not-allowed';
  document.getElementById('inv-file').value='';
}
